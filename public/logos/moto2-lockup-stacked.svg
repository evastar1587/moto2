<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="200" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400&amp;display=swap');
      .logo-text { 
        font-family: 'Bebas Neue', sans-serif; 
        font-weight: bold;
        letter-spacing: -0.03em;
      }
      .company-text {
        font-family: 'Inter', sans-serif;
        font-weight: 400;
        letter-spacing: 0.02em;
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="200" fill="#1A1A1A"/>
  
  <!-- Company Name (top) -->
  <text x="200" y="50" class="company-text" font-size="24" fill="#F5F1E8" text-anchor="middle">moto2moto</text>
  
  <!-- MOTO Text -->
  <text x="200" y="145" class="logo-text" font-size="72" fill="#D40000" text-anchor="middle">MOTO</text>
  
  <!-- Superscript 2 -->
  <text x="310" y="115" class="logo-text" font-size="43" fill="#D40000">2</text>
</svg>
