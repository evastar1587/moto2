<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;display=swap');
      .logo-text { 
        font-family: 'Bebas Neue', sans-serif; 
        font-weight: bold;
        letter-spacing: -0.03em;
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="120" fill="#1A1A1A"/>
  
  <!-- MOTO Text -->
  <text x="50" y="80" class="logo-text" font-size="72" fill="#D40000">MOTO</text>
  
  <!-- Superscript 2 -->
  <text x="285" y="50" class="logo-text" font-size="43" fill="#D40000">2</text>
</svg>
